syntax = "proto3";
package proto;

option go_package = "./proto";

import "google/protobuf/struct.proto";

message StringList {
  repeated string values = 1;
}

enum ExecutionStatus {
  SUCCESS = 0;
  FAILURE = 1;
}

message ConfigureRequest {
  map<string, string> config = 1;
  google.protobuf.Struct policy_data = 2;
  map<string, StringList> policyBehavior = 3;
}

message ConfigureResponse {
  bytes value = 1;
}

message InitRequest {
  repeated string policyPaths = 1;
  uint32 apiServer = 2;
  map<string, StringList> policyBehavior = 3;
}

message InitResponse {
}

message EvalRequest {
  repeated string policyPaths = 1;
  uint32 apiServer = 2;
  map<string, StringList> policyBehavior = 3;
}

/**
 * EvalResponse is the result of an assessment check
 * Results are sent back by the plugins using the Result service defined
 * separately.
 */
message EvalResponse {
  ExecutionStatus status = 1;
}

service Runner {
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);
  rpc Eval(EvalRequest) returns (EvalResponse);
  rpc Init(InitRequest) returns (InitResponse);
}
